name: Build Android Release APK

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish APK to GitHub Release. Leave false for private paid APK delivery."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "v*"

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret. Add release signing secrets before building customer APKs."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/caydenjoy.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Verify APK exists
        run: |
          test -f android/app/build/outputs/apk/release/app-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: caydenjoy-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: apk-${{ github.run_number }}
          name: CaydenJoy Release APK Build ${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: android/app/build/outputs/apk/release/app-release.apk
